# This is the name of your workflow (shown in GitHub Actions UI)
name: Run Tests in Github Actions

# Defines when the workflow will trigger
on:
  push:                      # Trigger when code is pushed
    branches: [ "main" ]     # Only runs when pushing to main branch
  pull_request:              # Trigger when a pull request is created/updated
    branches: [ "main" ]     # Only for PRs targeting main branch
  workflow_dispatch:         # Allows manual trigger from GitHub UI

# Jobs define what tasks will run
jobs:
  execute-tests:             # Job ID (can be referenced by other jobs if needed)
    name: Run All Test Cases # Display name in GitHub Actions UI
    runs-on: ubuntu-latest   # Specifies the runner (Linux environment)

    steps:                   # Steps are executed sequentially
      - name: Checkout Code
        uses: actions/checkout@v4
        # This downloads your repository code into the runner

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
        # Installs Python 3.10 in the runner environment

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Upgrades pip to the latest version

          pip install -r requirements.txt
          # Installs all dependencies listed in requirements.txt

      - name: Run All Test Cases
        run: |
          robot SampleTest.robot
        # Executes Robot Framework test file

      - name: Upload Artifacts
        if: always()
        # Ensures this step runs even if previous steps fail

        uses: actions/upload-artifact@v4
        # Uploads files so you can download them from GitHub Actions UI

        with:
          name: all-test-cases-results
          # Name of the artifact bundle

          path: |
            log.html
            report.html
            output.xml
            *.png
          # Files to upload (Robot Framework reports + screenshots)